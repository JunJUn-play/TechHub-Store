<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }} - TechHub</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 5px; }
        nav { margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        nav a { margin-right: 20px; color: #3498db; text-decoration: none; font-weight: bold; }
        .product-detail { margin: 20px 0; }
        .price { font-size: 32px; color: #27ae60; font-weight: bold; margin: 20px 0; }
        .stock { color: #7f8c8d; font-size: 16px; margin: 10px 0; }
        .btn { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; margin-top: 20px; }
        .btn:hover { background: #2980b9; }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <nav><a href="{% url 'product_list' %}">← Back to Products</a></nav>
        
        <div class="product-detail">
            <h1>{{ product.name }}</h1>
            <p>{{ product.description }}</p>
            <p class="price">${{ product.price }}</p>
            <p class="stock">📦 In Stock: {{ product.stock }} units</p>
           {% if product.stock > 0 %}
            <a href="{% url 'add_to_cart' product.id %}" class="btn btn-primary">
            Add to Cart
            </a>
            {% else %}
            <button class="btn btn-secondary" disabled>
            Out of Stock
            </button>
            {% endif %}
        </div>
    </div>
</body>
</html>
