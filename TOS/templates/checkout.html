{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Checkout | TechHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">Checkout</h3>

        </div>

        <div class="card-body">

            <a href="{% url 'view_cart' %}" class="btn btn-outline-secondary mb-4">
                ← Back to Cart
            </a>

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">Full Name</label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            required>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">Email</label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            required>

                    </div>

                </div>

                <div class="mt-3">

                    <label class="form-label">Phone Number</label>

                    <input
                        type="text"
                        class="form-control"
                        name="phone"
                        required>

                </div>

                <div class="mt-3">

                    <label class="form-label">Delivery Address</label>

                    <textarea
                        class="form-control"
                        rows="4"
                        name="address"
                        required></textarea>

                </div>

                <div class="mt-4">

                    <label class="form-label fw-bold">
                        Payment Method
                    </label>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" value="Cash On Delivery" checked>
                        <label class="form-check-label">
                            Cash On Delivery
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" value="ABA">
                        <label class="form-check-label">
                            ABA Pay
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" value="ACLEDA">
                        <label class="form-check-label">
                            ACLEDA
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" value="Wing">
                        <label class="form-check-label">
                            Wing Bank
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" value="KHQR">
                        <label class="form-check-label">
                            KHQR
                        </label>
                    </div>

                </div>

                <button class="btn btn-success btn-lg mt-4 w-100">
                    Complete Purchase
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
