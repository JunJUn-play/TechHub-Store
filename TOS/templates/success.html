<!DOCTYPE html>
<html>
<head>
    <title>Payment Success - TechHub</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 5px; text-align: center; }
        .success-icon { font-size: 64px; margin: 20px 0; }
        h1 { color: #27ae60; }
        .message { color: #7f8c8d; font-size: 16px; margin: 20px 0; line-height: 1.6; }
        .btn { background: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; margin-top: 20px; text-decoration: none; display: inline-block; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Payment Successful!</h1>
        <p class="message">
            Thank you for your purchase! Your order has been received and is being processed.
            <br><br>
            You will receive a confirmation email shortly with tracking information.
        </p>
        <a href="{% url 'product_list' %}" class="btn">Continue Shopping</a>
    </div>
</body>
</html>
